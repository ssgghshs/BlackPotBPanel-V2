user  root;
worker_processes  auto;
error_log  /usr/local/openresty/nginx/logs/error.log  warn;
pid        /usr/local/openresty/nginx/logs/nginx.pid;

events {
    worker_connections  1024;
    use epoll;
    multi_accept on;
}

http {
    include       /usr/local/openresty/nginx/conf/mime.types;
    default_type  application/octet-stream;

    # 日志格式定义
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    log_format  waf  '$remote_addr - $remote_user [$time_local] "$request" '
                     '$status $body_bytes_sent "$http_referer" '
                     '"$http_user_agent" "$http_x_forwarded_for" '
                     'waf_type=$waf_type waf_action=$waf_action';

    access_log  /usr/local/openresty/nginx/logs/access.log  main;
    error_log  /usr/local/openresty/nginx/logs/error.log  warn;

    # 全局 WAF 变量（允许 Lua 在任意 location 中读写）
    map $host $waf_type {
        default "-";
    }
    map $host $waf_action {
        default "-";
    }

    # --- 全局错误页面配置 [新增/修改] ---
    # 497 是 Nginx 内部错误码：当 HTTP 请求发送到 HTTPS 端口时触发
    error_page 400 497 /400.html;
    error_page 404 /404.html;
    error_page 500 /500.html;
    error_page 502 /502.html;
    error_page 503 /503.html;
    error_page 504 /504.html;

    # 拦截后端错误：如果 proxy_pass 的后端返回 400/500，使用 Nginx 自定义页面
    proxy_intercept_errors on;
    # --------------------------------

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    client_max_body_size 100m;
    client_body_timeout 60;
    client_header_timeout 60;
    send_timeout 60;

    gzip  on;
    gzip_vary on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
    gzip_disable "MSIE [1-6]\.";

    lua_package_path "/usr/local/openresty/nginx/lua/?.lua;/usr/local/openresty/lualib/?.lua;;";
    lua_code_cache on;
    lua_shared_dict waf_limit 10m;
    lua_shared_dict waf_antitamper 10m; 
    lua_shared_dict waf_blacklist 10m;
    lua_shared_dict waf_whitelist 10m;
    lua_shared_dict waf_cc 100m;

    init_by_lua_block {
        require "resty.core"
    }

    # 加载站点配置
    include /usr/local/openresty/nginx/conf/conf.d/*.conf;
}